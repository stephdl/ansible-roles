---

bounca_version: 0.1.1
#bounca_version: master
#bounca_git_url: https://github.com/repleo/bounca.git
bounca_archive_url: https://github.com/repleo/bounca/archive/v{{ bounca_version }}.tar.gz
bounca_root_dir: /opt/bounca
bounca_port: 8084
bounca_src_ip: []
