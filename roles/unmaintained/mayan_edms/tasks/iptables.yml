---

- name:  Handle Mayan EDMS port in the firewall
  iptables_raw:
    name: mayan_port
    state: "{{ (mayan_src_ip | length > 0) | ternary('present','absent') }}"
    rules: "-A INPUT -m state --state NEW -p tcp --dport {{ mayan_port }} -s {{ mayan_src_ip | join(',') }} -j ACCEPT"
  tags: firewall,mayan

