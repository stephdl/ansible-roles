---

- name:  Handle navidrome ports in the firewall
  iptables_raw:
    name: navidrome_port
    state: "{{ (nd_src_ip | length > 0) | ternary('present','absent') }}"
    rules: "-A INPUT -m state --state NEW -p tcp --dport {{ nd_port }} -s {{ nd_src_ip | join(',') }} -j ACCEPT"
  tags: firewall,navidrome
