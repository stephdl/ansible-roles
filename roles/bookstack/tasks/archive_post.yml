---

- name: Compress previous version
  command: tar cf {{ bookstack_root_dir }}/archives/{{ bookstack_current_version }}.tar.zst ./ --use-compress-program=zstd
  args:
    chdir: "{{ bookstack_root_dir }}/archives/{{ bookstack_current_version }}"
    warn: False
  environment:
    ZSTD_CLEVEL: 10
  tags: bookstack
