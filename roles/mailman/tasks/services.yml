---

- name: Start and enable services
  service: name={{ item }} state=started enabled=True
  loop:
    - mailman-core
    - mailman-web
  tags: mailman

- name: Start and enable timers
  systemd: name={{ item }}.timer state=started enabled=True
  loop:
    - mailman-digests
    - mailman-notify
  tags: mailman
