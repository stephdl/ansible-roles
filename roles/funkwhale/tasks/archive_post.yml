---

- name: Compress previous version
  command: tar cf {{ funkwhale_root_dir }}/archives/{{ funkwhale_current_version }}.tar.zst --use-compress-program=zstd ./
  args:
    chdir: "{{ funkwhale_root_dir }}/archives/{{ funkwhale_current_version }}"
    warn: False
  environment:
    ZSTD_CLEVEL: 10
  tags: funkwhale

