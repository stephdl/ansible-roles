---

- name: Compress previous version
  command: tar cf {{ sftpgo_root_dir }}/archives/{{ sftpgo_current_version }}.tar.zst --use-compress-program=zstd ./
  args:
    chdir: "{{ sftpgo_root_dir }}/archives/{{ sftpgo_current_version }}"
    warn: False
  environment:
    ZSTD_CLEVEL: 10
  tags: sftpgo
